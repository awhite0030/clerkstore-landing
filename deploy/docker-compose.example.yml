services:
  clerkstore:
    build:
      context: ..
      dockerfile: Dockerfile
    image: clerkstore-landing:latest
    container_name: clerkstore-app
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - clerkstore-net

  nginx-proxy:
    image: nginx:alpine
    container_name: clerkstore-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.example.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - clerkstore
    networks:
      - clerkstore-net

networks:
  clerkstore-net:
    driver: bridge
